
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Sense | AI Decision Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#00d9ff', // Vibrant Cyan
                secondary: '#ff006e', // Vibrant Pink
                accent: '#00f5ff', // Light Cyan
                dark: '#0a0e27', // Deep navy
                surface: '#151932' // Dark blue-gray
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out',
              'slide-in-left': 'slideInLeft 0.6s ease-out',
              'slide-in-right': 'slideInRight 0.6s ease-out',
              'slide-in-up': 'slideInUp 0.6s ease-out',
              'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
              'float': 'float 3s ease-in-out infinite',
              'shimmer': 'shimmer 2s ease-in-out infinite',
              'bounce-in': 'bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)',
              'scale-in': 'scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-40px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              slideInRight: {
                '0%': { opacity: '0', transform: 'translateX(40px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              slideInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseGlow: {
                '0%, 100%': { 
                  boxShadow: '0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(0, 217, 255, 0.1)'
                },
                '50%': { 
                  boxShadow: '0 0 30px rgba(0, 217, 255, 0.6), 0 0 60px rgba(0, 217, 255, 0.3)'
                },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shimmer: {
                '0%, 100%': { 
                  backgroundPosition: '-1000px 0',
                  opacity: '0.8'
                },
                '50%': { 
                  backgroundPosition: '1000px 0',
                  opacity: '1'
                },
              },
              bounceIn: {
                '0%': { opacity: '0', transform: 'scale(0.3)' },
                '50%': { opacity: '1', transform: 'scale(1.05)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.9)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      * {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #151932 100%);
        color: #f8fafc;
        overflow-x: hidden;
      }
      .glass {
        background: rgba(21, 25, 50, 0.5);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 217, 255, 0.15);
        box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
      }
      .glass-light {
        background: rgba(0, 217, 255, 0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 217, 255, 0.2);
        box-shadow: inset 0 0 20px rgba(0, 217, 255, 0.05);
      }
      .glass-hover {
        transition: all 0.3s ease;
        border-color: rgba(255, 0, 110, 0.3);
        box-shadow: 0 8px 32px rgba(255, 0, 110, 0.2);
      }
      .glass:hover {
        border-color: rgba(0, 217, 255, 0.3);
        box-shadow: 0 8px 32px rgba(0, 217, 255, 0.2);
      }
      .btn-gradient {
        background: linear-gradient(135deg, #00d9ff 0%, #00f5ff 100%);
        color: #0a0e27;
        font-weight: 600;
        box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
      }
      .btn-gradient:hover {
        box-shadow: 0 0 30px rgba(0, 217, 255, 0.6), 0 0 60px rgba(0, 217, 255, 0.3);
        transform: translateY(-2px);
      }
      .btn-gradient-pink {
        background: linear-gradient(135deg, #ff006e 0%, #ff1493 100%);
        color: white;
        font-weight: 600;
        box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
      }
      .btn-gradient-pink:hover {
        box-shadow: 0 0 30px rgba(255, 0, 110, 0.6), 0 0 60px rgba(255, 0, 110, 0.3);
        transform: translateY(-2px);
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: rgba(10, 14, 39, 0.8); }
      ::-webkit-scrollbar-thumb { 
        background: linear-gradient(180deg, #00d9ff, #ff006e);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover { 
        background: linear-gradient(180deg, #00f5ff, #ff1493);
      }
      input, textarea, select {
        background: rgba(0, 217, 255, 0.05) !important;
        border-color: rgba(0, 217, 255, 0.2) !important;
        color: #f8fafc !important;
      }
      input:focus, textarea:focus, select:focus {
        border-color: rgba(0, 217, 255, 0.5) !important;
        box-shadow: 0 0 15px rgba(0, 217, 255, 0.2) !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
